# ==============================
# PREFIX
# ==============================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ==============================
# TERMINAL / COLORS
# ==============================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g focus-events on

# ==============================
# PERFORMANCE
# ==============================
set -s escape-time 0
set -g history-limit 100000

# ==============================
# MOUSE
# ==============================
set -g mouse on

# ==============================
# PANE SPLITTING
# ==============================
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# ==============================
# PANE NAVIGATION (VIM STYLE)
# ==============================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==============================
# PANE RESIZE
# ==============================
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5

# ==============================
# PANE MANAGEMENT
# ==============================
bind '<' swap-pane -U
bind '>' swap-pane -D
bind x confirm-before -p "Kill pane? (y/n)" kill-pane

# ==============================
# WINDOW MANAGEMENT
# ==============================
bind c new-window
bind , command-prompt "rename-window %%"
bind & confirm-before -p "Kill window? (y/n)" kill-window
setw -g allow-rename off
setw -g automatic-rename off

# ==============================
# WINDOW NAVIGATION (META + h/l)
# ==============================
bind -n M-h previous-window
bind -n M-l next-window

# ==============================
# COPY MODE (VIM)
# ==============================
setw -g mode-keys vi
bind [ copy-mode

# ==============================
# STATUS BAR
# ==============================
set -g status-position bottom
set -g status-interval 2

# ==============================
# VISUAL SETTINGS
# ==============================
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour39
set -g visual-bell on
set -g bell-action none
set -g monitor-activity on
set -g visual-activity on

# ==============================
# SYNCHRONIZE PANES
# ==============================
bind y setw synchronize-panes

# ==============================
# CONFIG RELOAD
# ==============================
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ==============================
# CLIPBOARD (Wayland / X11 / macOS)
# ==============================
if-shell 'command -v wl-copy >/dev/null' \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'"
if-shell 'command -v xclip >/dev/null' \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"
if-shell 'uname | grep -q Darwin' \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"

# ==============================
# TPM PLUGINS
# ==============================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'

# Opcional: tmux-ram-usage pode falhar → comente se instabilidade
#set -g @plugin 'tmux-plugins/tmux-ram-usage'

set -g @plugin 'dracula/tmux'

# ==============================
# DRACULA THEME OPTIONS
# ==============================
set -g @dracula-show-powerline true
set -g @dracula-show-battery true
set -g @dracula-cwd-max-dirs "3"
set -g @dracula-cwd-max-chars "0"
set -g @dracula-plugins "cpu-usage ram-usage battery cwd"

# ==============================
# LOAD TPM
# ==============================
run -b '~/.tmux/plugins/tpm/tpm'