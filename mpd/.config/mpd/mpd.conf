# folders and files
music_directory    "~/music"
playlist_directory "~/.mpd/playlists"
db_file            "~/.mpd/database"
log_file           "~/.mpd/log"
pid_file           "~/.mpd/pid"
state_file         "~/.mpd/state"

# useful extras
auto_update "yes"
restore_paused "yes"
replaygain "auto"

# sound output (pipewire)
audio_output {
    type    "pipewire"
    name    "my pipewire output"
}

# visualizer output (for ncmpcpp)
audio_output {
    type    "fifo"
    name    "my_fifo"
    path    "/tmp/mpd.fifo"
    format  "44100:16:2"
}
